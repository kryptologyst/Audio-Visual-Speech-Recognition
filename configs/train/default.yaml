# Training configuration
train:
  # Data
  batch_size: 16
  num_workers: 4
  pin_memory: true
  
  # Optimization
  optimizer: "adamw"
  learning_rate: 1e-4
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1e-9
  
  # Scheduler
  scheduler: "cosine_with_warmup"
  warmup_steps: 1000
  max_steps: 50000
  
  # Training
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: true
  
  # Logging
  log_interval: 100
  eval_interval: 1000
  save_interval: 2000
  
  # Checkpointing
  save_dir: "checkpoints"
  max_checkpoints: 5
  
  # Early stopping
  patience: 5
  min_delta: 0.001
